<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tafahom Avatar</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a0f; }
#unity-container { width: 100%; height: 100%; position: relative; }
#unity-canvas { width: 100%; height: 100%; display: block; }
#unity-loading-bar { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; display: block; }
#unity-logo { width: 64px; height: 64px; margin: 0 auto 16px; border: 3px solid rgba(99,102,241,0.5); border-radius: 16px; border-top-color: #6366f1; animation: spin 1s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
#unity-progress-bar-empty { width: 200px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; margin: 0 auto; }
#unity-progress-bar-full { width: 0%; height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); border-radius: 3px; transition: width 0.3s; }
#unity-loading-text { color: rgba(255,255,255,0.5); font-size: 13px; font-family: -apple-system, sans-serif; margin-top: 12px; }
#unity-footer { display: none; }
#unity-warning { position: absolute; top: 10px; left: 10px; right: 10px; z-index: 10; }
#status-message { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: rgba(255,255,255,0.4); font-family: -apple-system, sans-serif; font-size: 14px; text-align: center; z-index: 5; pointer-events: none; }
</style>
</head>
<body>
<div id="unity-container">
  <canvas id="unity-canvas" tabindex="-1"></canvas>
  <div id="unity-loading-bar">
    <div id="unity-logo"></div>
    <div id="unity-progress-bar-empty">
      <div id="unity-progress-bar-full"></div>
    </div>
    <div id="unity-loading-text">Loading Avatar...</div>
  </div>
  <div id="unity-warning"></div>
  <div id="status-message">Initializing...</div>
</div>

<script>
var buildUrl = "https://tafahom.io/unity/Build";
var loaderUrl = buildUrl + "/unity.loader.js";

var canvas = document.querySelector("#unity-canvas");

function unityShowBanner(msg, type) {
  var warningBanner = document.querySelector("#unity-warning");
  function updateBannerVisibility() {
    warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
  }
  var div = document.createElement('div');
  div.innerHTML = msg;
  if (type === 'error') div.style = 'background: rgba(239,68,68,0.9); color: white; padding: 10px 16px; border-radius: 8px; margin-bottom: 8px; font-family: sans-serif; font-size: 13px;';
  else div.style = 'background: rgba(234,179,8,0.9); color: black; padding: 10px 16px; border-radius: 8px; margin-bottom: 8px; font-family: sans-serif; font-size: 13px;';
  warningBanner.appendChild(div);
  if (type !== 'error') setTimeout(function() { warningBanner.removeChild(div); updateBannerVisibility(); }, 5000);
  updateBannerVisibility();
}

var config = {
  arguments: [],
  dataUrl: buildUrl + "/unity.data",
  frameworkUrl: buildUrl + "/unity.framework.js",
  codeUrl: buildUrl + "/unity.wasm",
  streamingAssetsUrl: buildUrl.replace('/Build', '/StreamingAssets'),
  companyName: "Tafahom",
  productName: "tafa",
  productVersion: "1.0.0",
  showBanner: unityShowBanner,
};

if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
  var meta = document.createElement('meta');
  meta.name = 'viewport';
  meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
  document.getElementsByTagName('head')[0].appendChild(meta);
  document.querySelector("#unity-container").className = "unity-mobile";
  canvas.className = "unity-mobile";
} else {
  canvas.style.width = "100%";
  canvas.style.height = "100%";
}

document.querySelector("#unity-loading-bar").style.display = "block";
document.querySelector("#status-message").textContent = "Loading Unity Engine...";

var script = document.createElement("script");
script.src = loaderUrl;
script.onload = function() {
  createUnityInstance(canvas, config, function(progress) {
    var pct = Math.round(progress * 100);
    document.querySelector("#unity-progress-bar-full").style.width = 100 * progress + "%";
    document.querySelector("#unity-loading-text").textContent = "Loading Avatar... " + pct + "%";
  }).then(function(unityInstance) {
    window.unityInstance = unityInstance;
    window.unityReady = true;
    document.querySelector("#unity-loading-bar").style.display = "none";
    document.querySelector("#status-message").style.display = "none";

    window.parent.postMessage({ type: 'UNITY_READY', source: 'tafahom-avatar' }, '*');

    document.querySelector("#unity-fullscreen-button").onclick = function() {
      unityInstance.SetFullscreen(1);
    };
  }).catch(function(message) {
    document.querySelector("#status-message").textContent = "Failed to load avatar: " + message;
    console.error("Unity load error:", message);
  });
};
document.body.appendChild(script);

var pendingAnimations = null;

function sendAnimations(animations) {
  if (window.unityInstance && window.unityReady) {
    if (Array.isArray(animations) && animations.length > 0) {
      window.unityInstance.SendMessage("tpose", "ReceiveAnimations", JSON.stringify(animations));
    }
  } else {
    pendingAnimations = animations;
  }
}

function checkPending() {
  if (pendingAnimations && window.unityInstance && window.unityReady) {
    sendAnimations(pendingAnimations);
    pendingAnimations = null;
  }
}

var origResolve = null;
var origThen = window.createUnityInstance ? window.createUnityInstance().then : null;
if (window.createUnityInstance) {
  var origCreate = window.createUnityInstance;
  window.createUnityInstance = function(canvas, config, onProgress) {
    return origCreate(canvas, config, onProgress).then(function(instance) {
      window.unityInstance = instance;
      window.unityReady = true;
      checkPending();
      window.parent.postMessage({ type: 'UNITY_READY', source: 'tafahom-avatar' }, '*');
      document.querySelector("#unity-loading-bar").style.display = "none";
      document.querySelector("#status-message").style.display = "none";
      return instance;
    });
  };
}

window.addEventListener('message', function(event) {
  if (!event.data) return;
  var type = event.data.type;
  var animations = event.data.animations || event.data.payload;

  if (type === 'PLAY_ANIMATION' || type === 'TAFAHOM_ANIMATIONS') {
    if (Array.isArray(type === 'TAFAHOM_ANIMATIONS' ? animations : event.data.animations)) {
      sendAnimations(type === 'TAFAHOM_ANIMATIONS' ? animations : event.data.animations);
    }
  }
});
</script>
</body>
</html>
